name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version-file: pyproject.toml
      - run: uv sync --locked --group dev
      - run: uv run --locked --no-sync python -m py_compile src/envman/*.py scripts/*.py install.py
      - run: uv run --locked --no-sync python -m unittest discover -s tests -p 'test_*.py'
      - run: uv run --locked --no-sync python scripts/version.py check
      - run: uv run --locked --no-sync python scripts/check_docs.py
      - run: uv run --locked --no-sync python scripts/render_installer.py && git diff --exit-code -- install.py
      - run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          uv build --no-build-isolation --out-dir /tmp/envman-build-a
          uv build --no-build-isolation --out-dir /tmp/envman-build-b
          cmp /tmp/envman-build-a/envman-*.whl /tmp/envman-build-b/envman-*.whl
          cmp /tmp/envman-build-a/envman-*.tar.gz /tmp/envman-build-b/envman-*.tar.gz
          uv run --locked --no-sync python scripts/release_assets.py --output /tmp/envman-build-a --version "$(cat VERSION)"
          UV_TOOL_DIR=/tmp/envman-tools UV_TOOL_BIN_DIR=/tmp/envman-bin uv tool install --python 3.12 --force --no-build --constraints /tmp/envman-build-a/runtime-constraints.txt /tmp/envman-build-a/envman-*.whl
          UV_TOOL_DIR=/tmp/envman-tools uv tool list | grep -E '^envman v0\\.1\\.0'
          /tmp/envman-bin/envman --version
